<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Free Age Calculator Online - Exact Age in Years, Months & Days</title>

    <meta name="description" content="Free online age calculator to find your exact age in years, months, days, and total days lived instantly.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BSQETZ21ZZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-BSQETZ21ZZ');
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-top: 30px;
            color: white;
        }

        .container {
            margin-top: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 90%;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        #result, #birthday, #lived {
            margin-top: 10px;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

<header>
    <h1>Age Calculator Online</h1>
</header>

<main class="container">
    <input type="date" id="dob">
    <h2 id="result"></h2>
    <p id="birthday"></p>
    <p id="lived"></p>
</main>

<script>
document.getElementById("dob").addEventListener("input", function () {
    if (!this.value) return;

    let dob = new Date(this.value);
    let today = new Date();

    let years = today.getFullYear() - dob.getFullYear();
    let months = today.getMonth() - dob.getMonth();
    let days = today.getDate() - dob.getDate();

    if (days < 0) {
        months--;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("result").innerText =
        `You are ${years} years, ${months} months and ${days} days old`;

    let nextBirthday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
    if (nextBirthday < today) {
        nextBirthday = new Date(today.getFullYear() + 1, dob.getMonth(), dob.getDate());
    }

    let diff = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

    document.getElementById("birthday").innerText =
        `🎉 Next birthday in ${diff} days`;

    let daysLived = Math.floor((today - dob) / (1000 * 60 * 60 * 24));

    document.getElementById("lived").innerText =
        `📊 You have lived approximately ${daysLived} days`;
});
</script>

</body>
</html>
