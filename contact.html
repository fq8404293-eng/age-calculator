<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Age Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
            color: white;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }

        a {
            color: white;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Contact Us</h1>
    <p>If you have any questions, send a message below.</p>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="4" placeholder="Your Message"></textarea>

    <button onclick="alert('Message feature not connected yet')">Send</button>

    <p style="margin-top:15px;">
        <a href="index.html">Back to Home</a>
    </p>
</div>

</body>
</html>
